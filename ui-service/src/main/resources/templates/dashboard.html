<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yahodzinska Digital Bank</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <h1>Yahodzinska Global Finance</h1>
    <p>найкращий та наймодніший банк</p>
</header>

<div class="container">

    <div class="auth-section card" th:if="${!isAdmin}">
        <h3>🔑 Вхід адміністратора</h3>
        <form th:action="@{/bank/auth}" method="post" class="input-group">
            <input type="password" name="apiKey" placeholder="Введіть секретний API-ключ" required>
            <button type="submit">Увійти</button>
        </form>
    </div>

    <div th:if="${isAdmin}">
        <div style="text-align: right; margin-bottom: 20px;">
            <a th:href="@{/bank/logout}" style="color: var(--danger); text-decoration: none; font-weight: bold;">🚪 Вийти</a>
        </div>

        <div class="form-grid">
            <div class="card">
                <h3>👤 Новий Клієнт</h3>
                <form th:action="@{/bank/clients/create}" method="post" class="input-group">
                    <input type="number" name="id" placeholder="ID (напр. 101)" required>
                    <input type="text" name="name" placeholder="Ім'я" required>
                    <input type="text" name="surname" placeholder="Прізвище" required>
                    <button type="submit">Створити</button>
                </form>
            </div>

            <div class="card">
                <h3>💳 Новий рахунок</h3>
                <form th:action="@{/bank/accounts/create}" method="post" class="input-group">
                    <input type="number" name="clientId" placeholder="ID власника" required>
                    <input type="number" step="0.01" name="balance" placeholder="Початковий баланс (грн)" required>

                    <select name="type" required style="padding: 12px; border-radius: 8px; margin-bottom: 10px; background: #1e293b; color: white; border: 1px solid #334155; font-family: 'Inter', sans-serif;">
                        <option value="" disabled selected>Оберіть тип рахунку</option>
                        <option value="SAVINGS">Ощадний (Savings)</option>
                        <option value="CREDIT">Кредитний (Credit)</option>
                    </select>

                    <input type="number" step="0.01" name="creditLimit" placeholder="Кредитний ліміт" value="0">

                    <button type="submit" style="background: var(--success); color: #0f172a; font-weight: 800;">Активувати</button>
                </form>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>📊 Реєстр Клієнтів</h3>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Клієнт</th>
                <th>Статус</th>
                <th th:if="${isAdmin}">Дії</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="client : ${clients}">
                <td th:text="${client.id}"></td>
                <td th:text="${client.name + ' ' + client.surname}"></td>
                <td><span class="badge badge-savings">Active</span></td>
                <td th:if="${isAdmin}">
                    <form th:action="@{/bank/clients/delete}" method="post" style="display:inline;">
                        <input type="hidden" name="id" th:value="${client.id}"/>
                        <button type="submit" class="btn-delete">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="card" style="margin-top: 30px; background: #0f172a; color: white;">
        <h3 style="color: var(--success);">💸 Швидкий Переказ</h3>
        <form th:action="@{/bank/transfer}" method="post" style="display: flex; gap: 10px; flex-wrap: wrap;">
            <input type="number" name="fromId" placeholder="ID відправника" required style="flex: 1; min-width: 120px;">
            <input type="number" name="toId" placeholder="ID отримувача" required style="flex: 1; min-width: 120px;">
            <input type="number" step="0.01" name="amount" placeholder="Сума (грн)" required style="flex: 1; min-width: 120px;">
            <button type="submit" style="background: var(--success); color: #0f172a; font-weight: bold; padding: 10px 25px;">Надіслати</button>
        </form>

        <div th:if="${message}"
             style="margin-top: 15px; padding: 10px; border-radius: 8px; text-align: center; font-weight: 600;"
             th:classappend="${#strings.contains(message, 'Error') ? 'badge-danger' : 'badge-savings'}"
             th:text="${message}">
        </div>
    </div>

</div>

<footer style="text-align: center; margin-top: 40px; color: #64748b; font-size: 0.8rem;">
    <p>&copy; Саша - пушечка, поставте, будь ласка, максимум, вона старалась дуже сильно :)</p>
</footer>

</body>
</html>
